schema_version: 1
app:
  timezone: "America/Edmonton"
  log_level: "INFO"
  auto_temperature_scan_minutes: 120
  auto_temperature_scan_seconds: 0
  auto_precipitation_scan_minutes: 360
  auto_precipitation_scan_seconds: 0
  resolution_check_minutes: 15
  open_position_review_seconds: 15
  open_position_weather_refresh_minutes: 15
temperature:
  enabled: true
  scan_limit: 300
  auto_alerts: true
  auto_paper_trade: true
precipitation:
  enabled: true
  scan_limit: 300
  auto_alerts: true
  auto_paper_trade: false
paper:
  enabled: true
  initial_capital: 5000.0
  stake_usd: 10.0
  max_open_positions: 20
  max_positions_per_market: 1
  fee_bps: 50.0
  entry_slippage_bps: 15.0
  exit_slippage_bps: 15.0
  mark_stale_after_seconds: 75
strategy:
  temperature:
    min_score: 0.62
    min_edge_abs: 0.12
    min_source_count: 2
    min_liquidity: 25.0
    min_hours_to_event: 1.0
    max_hours_to_event: 192.0
    max_source_age_hours: 6.0
    max_source_dispersion_pct: 0.18
    exit_min_score: 0.55
    exit_near_fair_edge_abs: 0.03
    exit_max_source_age_hours: 8.0
    exit_max_source_dispersion_pct: 0.24
    exit_min_hours_to_event: 0.5
  precipitation:
    min_score: 0.66
    min_edge_abs: 0.14
    min_source_count: 2
    min_liquidity: 25.0
    min_hours_to_event: 1.0
    max_hours_to_event: 744.0
    max_source_age_hours: 24.0
    max_source_dispersion_pct: 0.22
    exit_min_score: 0.58
    exit_near_fair_edge_abs: 0.04
    exit_max_source_age_hours: 30.0
    exit_max_source_dispersion_pct: 0.28
    exit_min_hours_to_event: 12.0
alerts:
  telegram_enabled: true
  send_scan_summary: true
  send_paper_entries: true
  send_resolution_updates: true
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8099
  refresh_seconds: 5.0
research:
  enabled: true
  runtime_policy_enabled: true
  auto_refresh_enabled: false
  auto_tuning_enabled: false
