name: Check HA Addon Versions

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-ha-addon-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Home Assistant addon versions were bumped
        env:
          HA_VERSION_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          HA_VERSION_HEAD: ${{ github.sha }}
        run: python -m weather_bot.ha_version_guard --base "$HA_VERSION_BASE" --head "$HA_VERSION_HEAD"
