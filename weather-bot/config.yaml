name: "Polymarket Weather Bot"
description: "Weather-market paper trader with HA ingress, research artifacts, and Telegram backup controls"
version: "3.2.55"
slug: "polymarket_weather_bot"
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:weather-partly-lightning
panel_title: Weather Bot
url: "https://github.com/mikey9900/polymarket_weather_bot"
arch:
  - aarch64
  - amd64
  - armv7
map:
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
options:
  telegram_bot_token: ""
  telegram_chat_id: ""
  wu_api_key: ""
  visual_crossing_api_key: ""
  weatherapi_key: ""
  dropbox_token: ""
  dropbox_refresh_token: ""
  dropbox_app_key: ""
  dropbox_app_secret: ""
  dropbox_root: "/"
  visual_crossing_free_plan_mode: true
  visual_crossing_enable_review_temperature: false
  precipitation_enabled: false
  temperature_market_scope: "both"
  temperature_max_forecast_temp_spread_f: 8.0
  temperature_scan_minutes: 120
  temperature_scan_seconds: 0
  precipitation_scan_minutes: 360
  precipitation_scan_seconds: 0
  resolution_check_minutes: 15
  open_position_weather_refresh_minutes: 60
  paper_initial_capital: 5000
  paper_stake_usd: 10
  dashboard_port: 8099
  timezone: "America/Edmonton"
schema:
  telegram_bot_token: password
  telegram_chat_id: str
  wu_api_key: password
  visual_crossing_api_key: password
  weatherapi_key: password
  dropbox_token: password
  dropbox_refresh_token: password
  dropbox_app_key: password
  dropbox_app_secret: password
  dropbox_root: str
  visual_crossing_free_plan_mode: bool
  visual_crossing_enable_review_temperature: bool
  precipitation_enabled: bool
  temperature_market_scope: str
  temperature_max_forecast_temp_spread_f: float(0,50)
  temperature_scan_minutes: int(15,720)
  temperature_scan_seconds: int(0,3600)
  precipitation_scan_minutes: int(30,1440)
  precipitation_scan_seconds: int(0,3600)
  resolution_check_minutes: int(5,240)
  open_position_weather_refresh_minutes: int(5,240)
  paper_initial_capital: float(100,1000000)
  paper_stake_usd: float(1,10000)
  dashboard_port: int(1024,65535)
  timezone: str
